name: Dev Agents — Auto Sprint

on:
  issues:
    types: [opened, labeled]

jobs:
  run-agents:
    name: Run generative dev agents
    runs-on: self-hosted          # Mac laptop runner
    permissions:
      issues: write
      contents: read

    # Only process issues with the "agent-task" label OR any newly opened issue
    if: |
      github.event.action == 'opened' ||
      contains(github.event.issue.labels.*.name, 'agent-task')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install pyodbc requests --break-system-packages --quiet

      - name: Run agents on issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE:  ${{ github.event.issue.title }}
          ISSUE_BODY:   ${{ github.event.issue.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:         ${{ github.repository }}
          SQL_SERVER:   ${{ secrets.SQL_SERVER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_USER:     ${{ secrets.SQL_USER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          OLLAMA_URL:   ${{ secrets.OLLAMA_URL }}
        run: python3 run_from_issue.py

      - name: Upload agent logs and generated code
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-${{ github.event.issue.number }}
          path: |
            agent_run.log
            agentOutput/
          retention-days: 30
